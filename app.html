<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0E0C0A">
<title>职场守护 · Workplace Guardian</title>
<style>
:root{
  --ink:#0E0C0A;--bg:#F8F5F0;--card:#FFFFFF;--warm:#F2EDE4;--border:#E5DDD2;
  --muted:#9A8F80;--red:#C13B2A;--amber:#D97706;--green:#16A34A;--blue:#1D4ED8;--purple:#7C3AED;
  --serif:'Noto Serif SC',Georgia,serif;--sans:-apple-system,'Noto Sans SC','PingFang SC',sans-serif;--mono:'DM Mono',ui-monospace,monospace;
  --tabh:64px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
/* app frame = phone width on desktop */
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;box-shadow:0 0 60px rgba(0,0,0,.06)}
.screen{display:none;padding:14px 18px calc(var(--tabh) + 26px);animation:fade .32s ease}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}
h1,h2,h3{font-family:var(--serif)}
.serif{font-family:var(--serif)}

/* top bar */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 18px 12px;background:rgba(248,245,240,.92);backdrop-filter:blur(14px)}
.tb-brand{display:flex;align-items:center;gap:9px}
.tb-logo{width:30px;height:30px;border-radius:9px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:14px}
.tb-name{font-family:var(--serif);font-weight:700;font-size:15px}
.lang-btn{border:1px solid var(--border);background:var(--card);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--sans)}
.lang-btn:active{transform:scale(.96)}

/* bottom tab bar */
.tabbar{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;height:var(--tabh);background:rgba(255,255,255,.94);backdrop-filter:blur(18px);border-top:1px solid var(--border);display:flex;z-index:60;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--muted);font-family:var(--sans);transition:color .15s}
.tab .ti{font-size:20px;line-height:1}
.tab .tl{font-size:10px;font-weight:600}
.tab.on{color:var(--ink)}
.tab.rec .ti{width:40px;height:40px;border-radius:14px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;margin-top:-14px;box-shadow:0 6px 16px rgba(14,12,10,.28)}
.tab.rec.on .tl,.tab.rec .tl{color:var(--ink)}

/* generic */
.eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.h-title{font-size:26px;font-weight:800;letter-spacing:-.5px;line-height:1.2;margin-bottom:6px}
.h-sub{font-size:13.5px;color:var(--muted);line-height:1.6;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(14,12,10,.04)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border-radius:14px;background:var(--ink);color:#fff;border:none;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .2s;box-shadow:0 2px 8px rgba(14,12,10,.2)}
.btn:active{transform:scale(.98)}
.btn-2{background:var(--warm);color:var(--ink);border:1.5px solid var(--border);box-shadow:none}
.btn-sm{width:auto;padding:9px 16px;font-size:13px;border-radius:11px}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.pill-g{background:rgba(22,163,74,.1);color:var(--green)}
.pill-a{background:#fff7ed;color:var(--amber)}
.pro-tag{font-size:9.5px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:6px;background:linear-gradient(135deg,#D97706,#C13B2A);color:#fff;vertical-align:middle}

/* ONBOARDING */
.onb{position:fixed;inset:0;z-index:200;background:var(--bg);max-width:480px;margin:0 auto;display:flex;flex-direction:column}
.onb-track{flex:1;display:flex;transition:transform .4s cubic-bezier(.22,1,.36,1)}
.onb-slide{min-width:100%;padding:70px 32px 20px;display:flex;flex-direction:column}
.onb-emoji{font-size:60px;margin-bottom:26px}
.onb-h{font-size:30px;font-weight:800;line-height:1.22;letter-spacing:-.5px;margin-bottom:16px}
.onb-h .hl{color:var(--red)}
.onb-p{font-size:15.5px;line-height:1.7;color:#5a5040}
.onb-visual{margin-top:28px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 8px 30px rgba(14,12,10,.06)}
.onb-foot{padding:14px 32px calc(34px + env(safe-area-inset-bottom))}
.onb-dots{display:flex;gap:7px;justify-content:center;margin-bottom:18px}
.onb-dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .3s}
.onb-dot.on{background:var(--ink);width:22px;border-radius:4px}
.onb-skip{position:absolute;top:calc(20px + env(safe-area-inset-top));right:26px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;z-index:2}
.mini-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.mini-row:last-child{border:none}
.mini-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* RECORD */
.cat-row{display:flex;gap:8px;margin-bottom:16px}
.cat{flex:1;padding:12px 6px;border-radius:14px;border:2px solid var(--border);background:var(--card);text-align:center;cursor:pointer;transition:all .15s}
.cat.on{border-color:var(--ink);background:var(--ink);color:#fff}
.cat .ce{font-size:20px}.cat .cn{font-size:11.5px;font-weight:700;margin-top:3px}
.fsec{margin-bottom:16px}
.flabel{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-family:var(--mono);margin-bottom:9px;display:flex;gap:7px;align-items:center}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:8px 13px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:#7a7060;font-size:13px;cursor:pointer;font-weight:500;transition:all .12s}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.inp,.ta{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:11px;padding:12px 13px;font-family:var(--sans);font-size:14px;color:var(--ink);outline:none;transition:border-color .15s}
.inp:focus,.ta:focus{border-color:var(--ink)}
.ta{min-height:100px;resize:none;line-height:1.6}
.two{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sev3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sev{padding:11px 6px;border-radius:12px;border:2px solid var(--border);background:var(--card);text-align:center;cursor:pointer;font-size:11.5px;font-weight:700}
.sev .se{font-size:17px;display:block;margin-bottom:3px}
.sev[data-s=low].on{background:#fefce8;border-color:#ca8a04}
.sev[data-s=med].on{background:#fff7ed;border-color:var(--amber)}
.sev[data-s=high].on{background:#fef2f2;border-color:var(--red)}
.evg{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.ev{padding:11px 4px;border-radius:11px;border:2px dashed var(--border);background:var(--card);text-align:center;cursor:pointer;font-size:10px;color:var(--muted);font-weight:600}
.ev.on{border-style:solid;border-color:var(--ink);color:var(--ink)}
.ev .ee{font-size:16px;display:block;margin-bottom:3px}
.enc{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--green);background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.2);border-radius:20px;padding:5px 11px;margin-bottom:16px}

/* TIMELINE */
.kpis{display:flex;gap:9px;margin-bottom:18px}
.kpi{flex:1;background:var(--ink);border-radius:14px;padding:14px 10px;color:#fff;text-align:center}
.kpi-n{font-family:var(--serif);font-size:24px;font-weight:700;line-height:1}
.kpi-l{font-size:10px;color:#8a8070;margin-top:4px}
.tl-item{display:flex;gap:13px}
.tl-stem{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0;padding-top:6px}
.tl-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0}
.tl-con{width:2px;flex:1;background:var(--border);margin-top:4px;min-height:14px}
.tl-item:last-child .tl-con{display:none}
.tl-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px;margin-bottom:14px}
.tl-ch{display:flex;justify-content:space-between;gap:8px;margin-bottom:6px}
.tl-ct{font-family:var(--serif);font-size:15px;font-weight:600}
.tl-cm{font-family:var(--mono);font-size:10.5px;color:var(--muted);white-space:nowrap}
.tl-cd{font-size:13px;color:#5a5040;line-height:1.6;margin-bottom:9px}
.tl-tags{display:flex;flex-wrap:wrap;gap:5px}
.tt{font-size:10px;padding:3px 8px;border-radius:12px;font-weight:600}
.tt-t{background:#f5f0e8;color:#7a6040}.tt-e{background:#f0fdf4;color:var(--green)}.tt-h{background:#fef2f2;color:var(--red)}
.empty{text-align:center;padding:70px 20px}
.empty-e{font-size:46px;margin-bottom:14px}
.empty-t{font-size:19px;font-weight:700;margin-bottom:7px}
.empty-s{font-size:13.5px;color:var(--muted);margin-bottom:22px;line-height:1.6}
.prog-wrap{height:8px;background:var(--warm);border-radius:4px;overflow:hidden;margin:10px 0 6px}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),#4ade80);transition:width .6s}

/* AI CHAT */
#s-ai{padding:0}
.ai-wrap{display:flex;flex-direction:column;height:calc(100dvh - var(--tabh))}
.ai-top{padding:14px 18px 12px;display:flex;align-items:center;gap:11px;border-bottom:1px solid var(--border);background:rgba(248,245,240,.92);backdrop-filter:blur(14px)}
.ai-av{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#0f5132,#198754);display:flex;align-items:center;justify-content:center;font-size:18px}
.ai-nm{font-family:var(--serif);font-weight:600;font-size:15px}
.ai-st{font-size:11px;color:var(--green);display:flex;align-items:center;gap:5px}
.ai-st::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green)}
.msgs{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:15px}
.cm{display:flex;flex-direction:column;gap:4px;max-width:84%}
.cm.usr{align-self:flex-end;align-items:flex-end;max-width:76%}
.cb{padding:12px 15px;border-radius:16px;font-size:14px;line-height:1.65}
.cm.ai .cb{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.cm.usr .cb{background:var(--ink);color:#fff;border-bottom-right-radius:4px}
.ct{font-family:var(--mono);font-size:9.5px;color:var(--muted);padding:0 3px}
.qr{display:flex;flex-wrap:wrap;gap:7px;padding:2px 18px 10px}
.qrb{padding:8px 13px;border-radius:18px;border:1.5px solid var(--border);background:var(--card);font-size:12.5px;cursor:pointer;font-family:var(--sans)}
.ai-foot{padding:10px 14px 12px;border-top:1px solid var(--border);display:flex;gap:9px;align-items:flex-end;background:var(--bg)}
.ai-ta{flex:1;background:var(--card);border:1.5px solid var(--border);border-radius:13px;padding:11px 14px;font-family:var(--sans);font-size:14px;outline:none;resize:none;min-height:44px;max-height:110px;line-height:1.5}
.ai-ta:focus{border-color:var(--ink)}
.ai-send{width:44px;height:44px;border-radius:13px;background:var(--ink);color:#fff;border:none;font-size:17px;cursor:pointer;flex-shrink:0}
.typing{display:flex;gap:4px;padding:13px 15px;background:var(--card);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:4px;width:fit-content}
.td{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:tb 1.2s infinite}
.td:nth-child(2){animation-delay:.2s}.td:nth-child(3){animation-delay:.4s}
@keyframes tb{0%,60%,100%{transform:scale(.7);opacity:.4}30%{transform:scale(1);opacity:1}}
.up-inline{margin:4px 0 2px;background:linear-gradient(135deg,#1a1510,#0e0c0a);border-radius:16px;padding:16px;color:#fff}
.up-inline h4{font-family:var(--serif);font-size:15px;margin-bottom:6px}
.up-inline p{font-size:12.5px;color:#b8ad9c;line-height:1.6;margin-bottom:12px}

/* CONSULT */
.seg{display:flex;gap:7px;margin-bottom:16px}
.seg-b{flex:1;padding:9px 4px;border-radius:11px;border:1.5px solid var(--border);background:var(--card);font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;text-align:center}
.seg-b.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px}
.ex-top{display:flex;gap:12px;align-items:flex-start}
.ex-av{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ex-nm{font-family:var(--serif);font-size:16px;font-weight:700}
.ex-ro{font-size:11.5px;color:var(--muted);margin-top:1px}
.ex-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:5px;display:inline-block}
.ex-desc{font-size:12.5px;color:#5a5040;line-height:1.6;margin:11px 0}
.ex-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.ex-tag{font-size:10px;padding:3px 8px;border-radius:8px;background:var(--warm);color:var(--muted)}
.ex-bot{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
.ex-price{font-size:11.5px;color:var(--muted)}
.ex-price strong{font-family:var(--serif);font-size:16px;color:var(--ink)}
.note{background:var(--warm);border:1px solid var(--border);border-radius:14px;padding:14px 16px;font-size:12.5px;color:#5a5040;line-height:1.65;margin-top:6px}

/* ME */
.me-hero{background:linear-gradient(160deg,#1a1510,#0e0c0a);border-radius:20px;padding:22px;color:#fff;margin-bottom:16px}
.me-row{display:flex;align-items:center;justify-content:space-between;padding:15px 0;border-bottom:1px solid var(--border);font-size:14px;cursor:pointer}
.me-row:last-child{border:none}
.me-row .mr-r{color:var(--muted);font-size:13px}
.pro-card{background:linear-gradient(135deg,#2a2015,#0e0c0a);border-radius:18px;padding:20px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.pro-card::after{content:'';position:absolute;top:-30px;right:-20px;width:120px;height:120px;background:radial-gradient(circle,rgba(217,119,6,.35),transparent 70%)}
.pro-feats{margin:14px 0}
.pro-feat{display:flex;gap:9px;font-size:13px;padding:5px 0;color:#e8e0d4}
.pro-feat::before{content:'✓';color:#f0b429;font-weight:700}

/* MODAL */
.ov{position:fixed;inset:0;z-index:300;background:rgba(14,12,10,.6);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sheet{background:#fff;border-radius:24px 24px 0 0;padding:26px 22px calc(26px + env(safe-area-inset-bottom));width:100%;max-width:480px;animation:slideup .3s cubic-bezier(.22,1,.36,1)}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet h3{font-size:21px;margin-bottom:8px}
.sheet .sd{font-size:13.5px;color:var(--muted);line-height:1.65;margin-bottom:18px}
.price-big{font-family:var(--serif);font-size:38px;font-weight:800}
.price-old{font-size:15px;color:var(--muted);text-decoration:line-through;margin-left:8px}
.pk-feat{display:flex;gap:10px;font-size:13.5px;padding:8px 0;align-items:flex-start;line-height:1.5}
.pk-feat .ic{font-size:16px;flex-shrink:0}
.close-x{position:absolute;top:16px;right:18px;font-size:22px;color:var(--muted);background:none;border:none;cursor:pointer}
.cf-inp{width:100%;background:var(--warm);border:1.5px solid var(--border);border-radius:11px;padding:12px 13px;font-family:var(--sans);font-size:14px;margin-bottom:9px;outline:none}
.cf-inp:focus{border-color:var(--ink)}
.fl2{font-size:12px;color:var(--muted);margin:10px 0 5px;font-weight:600}
.letter{background:var(--warm);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:13px;line-height:1.75;color:#3a3228;max-height:230px;overflow-y:auto;white-space:pre-wrap;position:relative}
.letter.locked{max-height:150px;overflow:hidden}
.letter.locked::after{content:'';position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(transparent,var(--warm))}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--tabh) + 20px);left:50%;transform:translateX(-50%) translateY(120px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:30px;font-size:13.5px;font-weight:600;z-index:400;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 30px rgba(0,0,0,.25);white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}

/* VOICE INPUT */
.vin{position:relative;display:block;width:100%}
.vin.flex{flex:1;width:auto}
.vin > input,.vin > textarea{width:100%;padding-right:44px}
.vin > .mic{position:absolute;right:7px;bottom:7px;width:32px;height:32px;border-radius:50%;border:none;background:var(--warm);color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:transform .12s}
.vin > .mic:active{transform:scale(.9)}
.vin > .mic.rec{background:var(--red);color:#fff;animation:micp 1.1s infinite}
@keyframes micp{0%,100%{box-shadow:0 0 0 0 rgba(193,59,42,.45)}70%{box-shadow:0 0 0 8px rgba(193,59,42,0)}}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div class="onb" id="onb">
  <button class="onb-skip" id="onbSkip" onclick="finishOnb()">跳过</button>
  <div class="onb-track" id="onbTrack">
    <!-- slide 1 -->
    <div class="onb-slide">
      <div class="onb-emoji">🫂</div>
      <div class="onb-h" data-t="onb1h"></div>
      <div class="onb-p" data-t="onb1p"></div>
    </div>
    <!-- slide 2 -->
    <div class="onb-slide">
      <div class="onb-emoji">📝</div>
      <div class="onb-h" data-t="onb2h"></div>
      <div class="onb-p" data-t="onb2p"></div>
      <div class="onb-visual">
        <div class="mini-row"><span class="mini-dot" style="background:#c13b2a"></span><b data-t="onb2r1"></b></div>
        <div class="mini-row"><span class="mini-dot" style="background:#d97706"></span><b data-t="onb2r2"></b></div>
        <div class="mini-row"><span class="mini-dot" style="background:#7c3aed"></span><b data-t="onb2r3"></b></div>
      </div>
    </div>
    <!-- slide 3 -->
    <div class="onb-slide">
      <div class="onb-emoji">🌿</div>
      <div class="onb-h" data-t="onb3h"></div>
      <div class="onb-p" data-t="onb3p"></div>
    </div>
    <!-- slide 4 -->
    <div class="onb-slide">
      <div class="onb-emoji">🛡️</div>
      <div class="onb-h"><span data-t="onb4h"></span></div>
      <div class="onb-p" data-t="onb4p"></div>
    </div>
  </div>
  <div class="onb-foot">
    <div class="onb-dots" id="onbDots"></div>
    <button class="btn" id="onbNext" onclick="onbAdvance()"></button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app" style="display:none">

  <!-- generic top bar (hidden on AI screen) -->
  <div class="topbar" id="topbar">
    <div class="tb-brand"><div class="tb-logo">守</div><span class="tb-name" data-t="brand"></span></div>
    <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
  </div>

  <!-- ===== RECORD ===== -->

/* ============ i18n apply ============ */
function applyLang(){
  document.documentElement.lang=LANG==='zh'?'zh-CN':'en';

  const nb=document.getElementById('onbNext');if(nb)nb.textContent=onbIdx>=3?t('onb_start'):t('onb_next');

  if(document.getElementById('s-timeline').classList.contains('on'))renderTL();

}
function toggleLang(){LANG=LANG==='zh'?'en':'zh';localStorage.zg_lang=LANG;applyLang();}

/* ============ ONBOARDING ============ */
let onbIdx=0;

function onbAdvance(){if(onbIdx>=3){finishOnb();return;}onbIdx++;document.getElementById('onbTrack').style.transform=`translateX(-${onbIdx*100}%)`;buildDots();document.getElementById('onbNext').textContent=onbIdx>=3?t('onb_start'):t('onb_next');}

/* ============ NAV ============ */
function go(p){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById('s-'+p).classList.add('on');
  document.querySelectorAll('.tab').forEach(tb=>tb.classList.toggle('on',tb.dataset.g===p));
  // AI screen is full-height, hide global top bar
  document.getElementById('topbar').style.display = p==='ai' ? 'none':'flex';
  window.scrollTo(0,0);
  if(p==='timeline')renderTL();
  if(p==='consult')renderExperts();
  if(p==='ai'&&!aiStep&&document.getElementById('msgs').children.length===0)aiInit();
}

/* ============ RECORD ============ */
function renderTypeChips(){
  const box=document.getElementById('typeChips');if(!box)return;
  const list=TYPES[curCat][LANG];
  box.innerHTML=list.map((v,i)=>`<div class="chip${sTypes.includes(TYPES[curCat].zh[i])?' on':''}" data-i="${i}" onclick="tc(this)">${v}</div>`).join('');
}
function pickCat(el){document.querySelectorAll('.cat').forEach(c=>c.classList.remove('on'));el.classList.add('on');curCat=el.dataset.c;sTypes=[];renderTypeChips();
  // family/other: evidence less relevant but keep optional
}
function tc(el){const i=+el.dataset.i;const key=TYPES[curCat].zh[i];el.classList.toggle('on');sTypes=el.classList.contains('on')?[...sTypes,key]:sTypes.filter(x=>x!==key);}
function pickSev(el){document.querySelectorAll('.sev').forEach(s=>s.classList.remove('on'));el.classList.add('on');sSev=el.dataset.s;}
function pickEv(el){el.classList.toggle('on');const v=el.dataset.e;sEv=el.classList.contains('on')?[...sEv,v]:sEv.filter(x=>x!==v);}
function saveRec(){
  const desc=document.getElementById('r-desc').value.trim();
  if(!desc){toast(t('need_desc'));return;}
  const types=sTypes.length?[...sTypes]:['其他'];
  recs.unshift({id:Date.now(),cat:curCat,types,who:val('r-who'),loc:val('r-loc'),
    date:document.getElementById('r-date').value||new Date().toISOString().slice(0,10),
    time:document.getElementById('r-time').value,desc,feel:val('r-feel'),sev:sSev||'med',ev:[...sEv]});
  localStorage.zg_recs=JSON.stringify(recs);
  ['r-who','r-loc','r-desc','r-feel'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('r-date').valueAsDate=new Date();document.getElementById('r-time').value='';
  document.querySelectorAll('.chip.on,.sev.on,.ev.on').forEach(c=>c.classList.remove('on'));
  sTypes=[];sSev=null;sEv=[];
  toast(t('saved'));
  setTimeout(()=>go('timeline'),900);
}
const val=id=>document.getElementById(id).value.trim();

/* ============ TIMELINE ============ */
const SC={low:'#B45309',med:'#D97706',high:'#C13B2A'};
function typeLabel(zhKey){ // map stored zh type to current lang label
  for(const c in TYPES){const i=TYPES[c].zh.indexOf(zhKey);if(i>=0)return TYPES[c][LANG][i];}
  return zhKey;
}
function renderTL(){
  const n=recs.length,we=recs.filter(r=>r.ev.length).length;
  const pct=n?Math.round(recs.reduce((a,r)=>{let s=40;if(r.ev.length)s+=28;if(r.who)s+=16;if(r.loc)s+=16;return a+Math.min(s,100);},0)/n):0;
  document.getElementById('k-t').textContent=n;
  document.getElementById('k-e').textContent=we;
  document.getElementById('k-p').textContent=n?pct+'%':'—';
  const body=document.getElementById('tlBody');
  if(!n){body.innerHTML=`<div class="empty"><div class="empty-e">🛡️</div><div class="empty-t">${t('empty_t')}</div><div class="empty-s">${t('empty_s')}</div><button class="btn btn-sm" style="margin:0 auto" onclick="go('record')">${t('empty_c')}</button></div>`;return;}
  const items=recs.map(r=>{const c=SC[r.sev]||SC.med;
    const tags=[...r.types.map(x=>`<span class="tt tt-t">${typeLabel(x)}</span>`),
      ...r.ev.map(e=>`<span class="tt tt-e">📎</span>`),
      r.sev==='high'?`<span class="tt tt-h">${t('sev_high')}</span>`:''].filter(Boolean).join('');
    return `<div class="tl-item"><div class="tl-stem"><div class="tl-dot" style="background:${c};box-shadow:0 0 0 3px var(--bg),0 0 0 5px ${c}44"></div><div class="tl-con"></div></div>
     <div class="tl-card"><div class="tl-ch"><div class="tl-ct">${typeLabel(r.types[0])}</div><div class="tl-cm">${r.date}${r.time?' '+r.time:''}</div></div>
     <div class="tl-cd">${r.desc.length>120?r.desc.slice(0,120)+'…':r.desc}</div><div class="tl-tags">${tags}</div></div></div>`;}).join('');
  const advice=n>=3?t('tl_advice_hi'):t('tl_advice_lo');
  body.innerHTML=`<div class="card" style="margin-bottom:16px">
      <div style="font-family:var(--serif);font-weight:600;font-size:15px">${t('tl_k3')}</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
      <div style="font-size:12px;color:var(--muted)">${advice}</div>
      <button class="btn" style="margin-top:14px" onclick="openPaywall()">📤 ${t('tl_export')}</button>
      <button class="btn btn-2" style="margin-top:8px" onclick="openCalc()">🧮 ${t('calc_h')}</button>
    </div>${items}`;
}

  const body= zh ?
`致 XX公司 人力资源部 / 相关负责人：

本人现就近期在工作中遭遇的不当对待，正式提出书面交涉。

自 ${r?r.date:'____'} 起，本人持续遭遇以下情形，已逐条记录在案（共 ${cnt} 条，含时间、地点、在场人员及证据）：

${recs.slice(0,3).map((x,i)=>`${i+1}. ${x.date} ${typeLabel(x.types[0])}：${x.desc.slice(0,40)}…`).join('\n')}

上述行为已涉嫌违反《劳动合同法》《劳动法》相关规定。本人现要求公司在 15 日内就此作出书面回应并纠正……

（解锁后可查看完整函件，含法条引用、诉求金额与落款）`
:
`To: HR Department / Responsible Manager,

I am writing to formally raise concerns regarding recent mistreatment in the workplace.

Since ${r?r.date:'____'}, I have experienced the following, each documented (${cnt} entries with date, place, witnesses and evidence):

${recs.slice(0,3).map((x,i)=>`${i+1}. ${x.date} — ${typeLabel(x.types[0])}: ${x.desc.slice(0,40)}…`).join('\n')}

These may violate applicable labor and employment law. I request a written response and corrective action within 15 days…

(Unlock to view the full letter with legal citations, claim amounts and signature block)`;
  document.getElementById('letterBody').textContent=body;
}

/* ============ SHEET / TOAST ============ */
function openSheet(id){document.getElementById(id).classList.add('on');}
function closeSheet(id){document.getElementById(id).classList.remove('on');}
document.querySelectorAll('.ov').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('on');}));
let toastT=null;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),3000);}

/* ============ CALCULATOR ============ */
let calcMode='work',calcReason='illegal',calcFault='none';
const CR=[['illegal','cr_illegal'],['force','cr_force'],['owe','cr_owe']];
const CF=[['none','cf_none'],['affair','cf_affair'],['violence','cf_violence'],['hide','cf_hide']];
function openCalc(){calcSwitch(calcMode);renderCalcChips();document.getElementById('calcResult').classList.add('hidden');openSheet('ovCalc');}
function calcSwitch(m){calcMode=m;
  document.getElementById('cm-work').classList.toggle('on',m==='work');
  document.getElementById('cm-divorce').classList.toggle('on',m==='divorce');
  document.getElementById('calcWork').classList.toggle('hidden',m!=='work');
  document.getElementById('calcDivorce').classList.toggle('hidden',m!=='divorce');
  document.getElementById('calcResult').classList.add('hidden');}
function renderCalcChips(){
  document.getElementById('calcReasonChips').innerHTML=CR.map(([k,tk])=>`<div class="chip${calcReason===k?' on':''}" onclick="calcReason='${k}';renderCalcChips()">${t(tk)}</div>`).join('');
  document.getElementById('calcFaultChips').innerHTML=CF.map(([k,tk])=>`<div class="chip${calcFault===k?' on':''}" onclick="calcFault='${k}';renderCalcChips()">${t(tk)}</div>`).join('');
}
function fmtMoney(n){return (LANG==='zh'?'¥':'$')+Math.round(n).toLocaleString('en-US');}
function doCalc(){
  const zh=LANG==='zh';let low,high,lines=[];
  if(calcMode==='work'){
    const s=+document.getElementById('calc-salary').value||0,y=+document.getElementById('calc-years').value||0;
    if(!s){toast(zh?'⚠️ 请填月工资':'⚠️ Enter monthly salary');return;}
    const N=Math.max(0.5,Math.round(y*2)/2),base=N*s;
    if(calcReason==='illegal'){low=2*base;high=2*base;lines.push(zh?`违法解除按 2N＝2×${N} 个月工资`:`Illegal termination = 2N = 2×${N} months`);}
    else if(calcReason==='force'){low=base;high=base+s;lines.push(zh?`经济补偿 N～N+1（${N}～${N+1} 个月）`:`Severance N–N+1 (${N}–${N+1} months)`);}
    else{low=base;high=2*base;lines.push(zh?`欠款可另主张本金＋25%赔偿；解除补偿 N～2N`:`Owed wages + 25% penalty (separate); severance N–2N`);}
    lines.push(zh?`月薪超当地社平3倍的部分有封顶，此处未计`:`A cap applies above 3× local avg wage (not counted)`);
  }else{
    const p=+document.getElementById('calc-prop').value||0;
    if(!p){toast(zh?'⚠️ 请填共同财产总额':'⚠️ Enter total marital assets');return;}
    low=p*0.5;
    if(calcFault==='none'){high=p*0.5;lines.push(zh?`原则均分，各约 50%`:`Split ~50/50 by default`);}
    else{high=p*0.65;lines.push(zh?`对方有过错，无过错方可争取多分（约 50%～65%）`:`With fault, the innocent party may seek more (~50%–65%)`);lines.push(zh?`并可另行主张离婚损害赔偿`:`May also claim divorce damages`);}
    lines.push(zh?`子女抚养费另算`:`Child support is calculated separately`);
  }
  const box=document.getElementById('calcResult');box.classList.remove('hidden');
  box.innerHTML=`<div style="background:linear-gradient(135deg,#1a1510,#0e0c0a);border-radius:16px;padding:18px;color:#fff;text-align:center">
    <div style="font-size:11px;color:#8a8070;letter-spacing:1px">${t('calc_range')}</div>
    <div style="font-family:var(--serif);font-size:29px;font-weight:800;margin:6px 0">${fmtMoney(low)}${high>low?' ~ '+fmtMoney(high):''}</div>
    <div style="font-size:11.5px;color:#b8ad9c;line-height:1.7">${lines.map(l=>'· '+l).join('<br>')}</div></div>
    <button class="btn" style="margin-top:12px" onclick="closeSheet('ovCalc');openPaywall()">${t('calc_cta_pack')} · ¥39</button>
    <button class="btn btn-2" style="margin-top:8px" onclick="closeSheet('ovCalc');toEmotion()">${t('calc_cta_lawyer')}</button>`;
}
function toEmotion(){document.querySelectorAll('.seg-b').forEach(b=>b.classList.toggle('on',b.dataset.r==='lawyer'));curRole='lawyer';go('consult');}

/* ============ VOICE INPUT (speech → text) ============ */
let sr=null,srBtn=null;
function setupVoice(){
  ['r-desc','r-feel','ci'].forEach(id=>{
    const f=document.getElementById(id);if(!f||f.closest('.vin'))return;
    const w=document.createElement('span');w.className='vin'+(id==='ci'?' flex':'');
    f.parentNode.insertBefore(w,f);w.appendChild(f);
    const b=document.createElement('button');b.type='button';b.className='mic';b.textContent='🎤';b.setAttribute('aria-label','voice');
    b.onclick=()=>micToggle(f,b);w.appendChild(b);
  });
}
function micToggle(field,btn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast(LANG==='zh'?'当前浏览器不支持语音，请手动输入':'Voice not supported here — type instead');return;}
  if(sr){sr.stop();if(srBtn===btn){return;}}
  sr=new SR();sr.lang=LANG==='zh'?'zh-CN':'en-US';sr.interimResults=true;sr.continuous=false;
  srBtn=btn;btn.classList.add('rec');
  const base=field.value?field.value+(/\s$/.test(field.value)?'':' '):'';
  sr.onresult=e=>{let out='';for(let i=0;i<e.results.length;i++)out+=e.results[i][0].transcript;
    field.value=base+out;
    if(field.tagName==='TEXTAREA'){field.style.height='auto';field.style.height=Math.min(field.scrollHeight,field.classList.contains('ai-ta')?110:400)+'px';}};
  sr.onerror=ev=>{if(ev.error==='not-allowed')toast(LANG==='zh'?'请允许麦克风权限':'Please allow microphone access');};
  sr.onend=()=>{btn.classList.remove('rec');sr=null;srBtn=null;};
  try{sr.start();}catch(e){btn.classList.remove('rec');sr=null;}
}

/* ============ INIT ============ */
(function init(){
  setupVoice();
  document.getElementById('r-date')&&(document.getElementById('r-date').valueAsDate=new Date());
  buildDots();
  applyLang();
  if(localStorage.zg_onboarded){document.getElementById('onb').style.display='none';document.getElementById('app').style.display='block';go('ai');}
})();
</script>
